version: "3.9"

services:

  # Endee vector database
  endee:
    image: endee/endee:latest
    container_name: endee-db
    ports:
      - "8080:8080"
    volumes:
      - endee_data:/data
    restart: unless-stopped

  # Research Agent
  agent:
    build: .
    container_name: research-agent
    depends_on:
      - endee
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENDEE_URL=http://endee:8080
    stdin_open: true
    tty: true
    command: python src/agent.py

volumes:
  endee_data:
